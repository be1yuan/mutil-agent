# MutilAgentOrchestrator configuration
# All ${ENV_VAR} references are resolved from process.env

providers:
  deepseek:
    apiKey: ${DEEPSEEK_API_KEY}
    baseURL: https://api.deepseek.com/anthropic
    defaultModel: deepseek-chat
  zhipu:
    apiKey: ${ZHIPU_API_KEY}
    baseURL: https://open.bigmodel.cn/api/anthropic
    defaultModel: glm-5.1

fallback:
  maxRetries: 3
  retryDelayMs: 1000
  retryableErrors:
    - rate_limit
    - timeout
    - server_error
  fallbackModel:
    provider: zhipu
    model: glm-5.1

security:
  maxConcurrentAgents: 5
  requireApproval:
    - file.delete
    - git.push
    - git.push --force

budget:
  maxDollars: 5.0

observability:
  logLevel: info
  metricsEnabled: true
