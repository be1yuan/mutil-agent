name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Linux x64
          mkdir -p agent-orch-${VERSION}-linux-x64
          cp -r dist templates package.json package-lock.json README.md LICENSE agent-orch-${VERSION}-linux-x64/
          tar czf agent-orch-${VERSION}-linux-x64.tar.gz agent-orch-${VERSION}-linux-x64
          rm -rf agent-orch-${VERSION}-linux-x64

          # Windows x64
          mkdir -p agent-orch-${VERSION}-win-x64
          cp -r dist templates package.json package-lock.json README.md LICENSE agent-orch-${VERSION}-win-x64/
          zip -r agent-orch-${VERSION}-win-x64.zip agent-orch-${VERSION}-win-x64
          rm -rf agent-orch-${VERSION}-win-x64

      - name: Publish to npm
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            agent-orch-*.tar.gz
            agent-orch-*.zip
