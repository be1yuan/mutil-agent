name: sci-introduction
description: SCI论文第一章绪论写作流程 — 文献检索 → 分析综述 → 绪论生成
version: "1.0"
variables:
  researchTopic: ""
  targetJournal: "SCI"
  language: "english"
  wordCount: "3000"

steps:
  # Step 1: 文献检索与初步分析
  - id: literature_search
    type: agent
    agentType: sci-intro-writer
    task: |
      请针对研究主题「${researchTopic}」进行系统性文献检索与分析。

      检索要求：
      1. **谷歌学术（Google Scholar）检索**：
         - 使用 3-5 组英文关键词组合分别检索
         - 优先关注近5年（2020-2025）高被引论文
         - 特别关注该领域的 Review/Survey 文章
         - 关键词组合模式："[核心概念] review", "[核心概念] state of the art", "[方法] in [领域]"

      2. **知网（CNKI）检索**：
         - 使用中文关键词检索
         - 重点关注核心期刊（北大核心、CSSCI、CSCD）论文
         - 检索相关博士论文的绪论部分
         - 关键词组合模式："[中文关键词] 综述", "[中文关键词] 研究现状"

      3. **输出要求**：
         - 汇总筛选出 20-30 篇核心参考文献清单
         - 按主题/方法/时间线对文献进行分类
         - 识别研究脉络与主要流派
         - 定位研究空白（Research Gap）
         - 提供结构化的文献分析报告

      目标期刊：${targetJournal}
      写作语言：${language}
      预期字数：${wordCount} 字

  # Step 2: 绪论正文撰写
  - id: write_introduction
    type: agent
    agentType: sci-intro-writer
    budget: 10.0
    task: |
      基于以下文献检索分析结果，撰写完整的 SCI 论文绪论：

      文献分析结果：
      ${steps.literature_search.content}

      撰写要求：
      1. **严格遵循五段结构**：
         - 1.1 研究背景（Background, 15-20%）
         - 1.2 问题陈述（Problem Statement, 10-15%）
         - 1.3 文献综述（Literature Review, 35-45%）
         - 1.4 研究目标与贡献（Objectives & Contributions, 10-15%）
         - 1.5 论文结构（Paper Organization, 5-10%）

      2. **写作语言**：${language}（如为 english 则用学术英语，如为 chinese 则用学术中文）

      3. **引用规范**：
         - 每个关键论断均需标注文献引用
         - 使用 [Author, Year] 格式或根据目标期刊要求调整
         - 在正文末尾附上完整的参考文献列表

      4. **字数要求**：${wordCount} 字

      5. **输出格式**：
         ```markdown
         # Chapter 1: Introduction

         ## 1.1 Background and Context
         [内容...]

         ## 1.2 Problem Statement
         [内容...]

         ## 1.3 Literature Review
         [内容...]

         ## 1.4 Research Objectives and Contributions
         [内容...]

         ## 1.5 Paper Organization
         [内容...]

         ---

         # Key References
         [参考文献列表...]

         # Research Gap Summary
         [研究空白总结...]

         # Notes
         [任何额外的说明或建议...]
         ```

  # Step 3: 质量检查与最终输出
  - id: quality_check
    type: agent
    agentType: sci-intro-writer
    task: |
      请对以下绪论文本进行质量检查，并给出改进建议：

      绪论草稿：
      ${steps.write_introduction.content}

      检查维度：
      1. **逻辑链条**：背景 → 问题 → 综述 → 目标 → 结构是否层层递进？
      2. **引用完整性**：每个关键论断是否有文献支撑？
      3. **文献覆盖度**：是否覆盖了领域核心文献和前沿文献？
      4. **语言质量**：学术用语是否规范？是否存在口语化表达？
      5. **结构比例**：各部分篇幅是否符合标准比例？
      6. **字数符合度**：总字数是否接近 ${wordCount} 字？

      输出格式：
      - 总体评分（1-10分）
      - 各维度的具体问题（如有）和改进建议
      - 如无重大问题，确认"质量合格，可直接使用"
